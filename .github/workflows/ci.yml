name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-sqlite:
    name: Tests (SQLite, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Import check
        run: python -c "from hevy2garmin.hevy import HevyClient; from hevy2garmin.mapper import lookup_exercise; from hevy2garmin.fit import generate_fit; print('OK')"

      - name: CLI check
        run: hevy2garmin --help

      - name: Run tests
        run: python -m pytest tests/ -v

  check-postgres:
    name: Tests (Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hevy2garmin_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package with cloud + dev dependencies
        run: pip install -e ".[dev,cloud]"

      - name: Run tests with Postgres backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/hevy2garmin_test
        run: python -m pytest tests/ -v

  check-typescript:
    name: Tests (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
